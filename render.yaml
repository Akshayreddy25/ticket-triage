services:
  - type: web
    name: ticket-triage-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.prod
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ticket-triage-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 1440

  - type: web
    name: ticket-triage-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/build
    envVars:
      - key: REACT_APP_API_URL
        value: https://ticket-triage-backend.onrender.com

databases:
  - name: ticket-triage-db
    plan: free
